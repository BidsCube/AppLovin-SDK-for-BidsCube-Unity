# GitHub Release for UPM package com.bidscube.sdk
#
# The published version is ALWAYS the version string in package.json (e.g. 1.0.3.1):
#   • Push tag v*     → RELEASE_VERSION = tag without "v"; must equal package.json["version"].
#   • workflow_dispatch → RELEASE_VERSION = package.json["version"] on the selected branch
#                         → creates GitHub Release + tag v{version} (e.g. v1.0.3.1) via `gh release create`.
#
# Artifact name: Bidscube-SDK-Unity-{version}.zip (e.g. Bidscube-SDK-Unity-1.0.3.1.zip).

name: Release (GitHub)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set RELEASE_VERSION
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
            echo "Version source: package.json on branch ${{ github.ref_name }}"
          else
            V="${GITHUB_REF#refs/tags/v}"
            echo "Version source: pushed tag ${{ github.ref_name }}"
          fi
          if [ -z "${V:-}" ]; then
            echo "::error::RELEASE_VERSION is empty (check tag or package.json)."
            exit 1
          fi
          echo "RELEASE_VERSION=$V" >> "$GITHUB_ENV"
          echo "::notice::com.bidscube.sdk UPM **$V** → ZIP \`Bidscube-SDK-Unity-${V}.zip\` • Git tag \`v${V}\`"

      - name: Verify package.json matches tag (tag push only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG="$RELEASE_VERSION"
          PKG=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "package.json version: $PKG"
          echo "Tag (without v): $TAG"
          test "$PKG" = "$TAG" || { echo "::error::package.json version ($PKG) must equal tag without v ($TAG). Example: tag v1.0.3.1 and \"version\": \"1.0.3.1\"."; exit 1; }
          echo "OK: package.json matches tag v${TAG}"

      - name: Validate package.json JSON
        run: python3 -c "import json; json.load(open('package.json'))"

      - name: Build package archive (no .git)
        run: |
          set -euo pipefail
          NAME="Bidscube-SDK-Unity-${RELEASE_VERSION}"
          zip -r "$NAME.zip" . -x ".git/*" -x "$NAME.zip"
          echo "ZIP_NAME=$NAME.zip" >> "$GITHUB_ENV"
          ls -la "$NAME.zip"

      - name: GitHub Release (tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: com.bidscube.sdk ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ env.ZIP_NAME }}
          body: |
            ## Unity Package Manager

            Add the dependency in `Packages/manifest.json`:

            ```json
            "com.bidscube.sdk": "https://github.com/${{ github.repository }}.git#${{ github.ref_name }}"
            ```

            Or use **Package Manager → Add package from git URL** with the same URL and branch/tag **`${{ github.ref_name }}`**.

            Package version (UPM): **`${{ env.RELEASE_VERSION }}`** — must match the tag (without `v`).

            Asset **`${{ env.ZIP_NAME }}`** = `Bidscube-SDK-Unity-{version}.zip` (repo snapshot without `.git`). Naming table: [`RELEASE.md`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/RELEASE.md).

            Documentation: [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md), [AppLovin MAX](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/Documentation~/APPLOVIN_MAX.md).

      - name: GitHub Release (manual — workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="v${RELEASE_VERSION}"
          ZIP="${{ env.ZIP_NAME }}"
          if gh release view "$TAG_NAME" --repo "${{ github.repository }}" 2>/dev/null; then
            echo "::error::Release $TAG_NAME already exists. Bump package.json or delete the release first."
            exit 1
          fi
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "com.bidscube.sdk ${RELEASE_VERSION}" \
            --generate-notes \
            "$ZIP"
          echo "Created release $TAG_NAME with asset $ZIP (UPM ${{ env.RELEASE_VERSION }})"
